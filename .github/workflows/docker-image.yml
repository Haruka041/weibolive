name: Build Image And Release

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare version info
        id: vars
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::12}"
          VERSION="commit-${SHORT_SHA}"
          REPO_LC="${GITHUB_REPOSITORY,,}"
          IMAGE="${{ env.REGISTRY }}/${REPO_LC}"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.vars.outputs.image }}:latest
            ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.short_sha }}
            ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.version }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.vars.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.version }}
          name: ${{ steps.vars.outputs.version }}
          generate_release_notes: true
          body: |
            Commit: `${{ github.sha }}`

            Docker image:
            - `${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.short_sha }}`
            - `${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.version }}`
            - `${{ steps.vars.outputs.image }}:latest`

            Digest: `${{ steps.build.outputs.digest }}`
